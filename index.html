<!DOCTYPE html>
<html lang="ar">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MoneyGuard</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header class="header">
            <h1>💰 Money Guard</h1>
            <p>Your smart budget tracker</p>
        </header>

        <section class="summary-section">
            <div class="card">
                <h2>Total Income</h2>
                <p id="total-income">0 USD</p>
            </div>
            <div class="card">
                <h2>Total Expenses</h2>
                <p id="total-expenses">0 USD</p>
            </div>
            <div class="card">
                <h2>Final Balance</h2>
                <p id="final-balance">0 USD</p>
            </div>
        </section>

        <section class="goals-section card">
            <h2>Goals Section</h2>
            <div class="goals-grid">
                <div class="goal-box">
                    <label for="initial-balance">Wallet Balance</label>
                    <input type="number" id="initial-balance" placeholder="Enter wallet balance">
                </div>
                <div class="goal-box">
                    <label for="minimum-balance">Minimum Safe Balance</label>
                    <input type="number" id="minimum-balance" placeholder="Enter minimum safe balance">
                </div>
            </div>
            <div class="alert-box">
                <p>Status: <span id="alert-status">Safe</span></p>
            </div>
        </section>

        <section class="form-section card">
            <h2>Add Transaction</h2>
            <form id="transaction-form">
                <div class="form-row">
                    <input type="date" id="date" required>
                    <select id="type">
                        <option value="income">Income</option>
                        <option value="expense">Expense</option>
                    </select>
                </div>
                <div class="form-row">
                    <select id="category">
                        <option value="Salary">Salary</option>
                        <option value="Rent">Rent</option>
                        <option value="Electricity">Electricity</option>
                        <option value="Water">Water</option>
                        <option value="Gas">Gas</option>
                        <option value="Internet">Internet</option>
                        <option value="Food">Food</option>
                        <option value="Transport">Transport</option>
                        <option value="Shopping">Shopping</option>
                    </select>
                    <input type="number" id="amount" placeholder="Amount" required>
                </div>
                <button type="submit">Add</button>
            </form>
        </section>

        <section class="transactions-section card">
            <h2>Transaction List</h2>
            <table>
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Type</th>
                        <th>Category</th>
                        <th>Amount</th>
                        <th>Delete</th>
                    </tr>
                </thead>
                <tbody id="transaction-list"></tbody>
            </table>
        </section>
    </div>

    <button id="reset-btn" class="reset-btn">Reset All Data</button>
    <p id="success-msg" style="display:none; color: green; margin-top:10px; text-align:center;">Transaction added
        successfully</p>

    <script src="script.js"></script>
</body>

</html>
